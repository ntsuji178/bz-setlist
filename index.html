<html lang="ja">

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>B'z FYOP＋ Setlist Tracker</title>

<style>
:root{
  --bg:#0f1117;--panel:#171a23;--panel2:#202432;--text:#f5f7fb;--muted:#a9b0c3;
  --line:#313749;--accent:#ffd36a;--accent2:#7ee7c8;--danger:#ff7d7d;
}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0f1117,#141824);color:var(--text)}
header{padding:24px 18px 16px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,17,23,.9);backdrop-filter:blur(12px);z-index:10}
h1{font-size:24px;margin:0 0 6px;letter-spacing:.03em}.sub{color:var(--muted);font-size:13px}
nav{display:flex;gap:8px;overflow-x:auto;padding:12px 18px;border-bottom:1px solid var(--line)}
button,.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:9px 13px;font-weight:700;cursor:pointer;white-space:nowrap}
button.active{background:var(--accent);color:#151515;border-color:var(--accent)}
main{padding:18px;max-width:1180px;margin:auto}.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.big{font-size:28px;font-weight:900}.muted{color:var(--muted);font-size:13px}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
select,input,textarea{background:#0c0e14;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px;min-width:320px}
table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;overflow:hidden;border-radius:14px}
th,td{border-bottom:1px solid var(--line);padding:12px 14px;text-align:left;font-size:14px;vertical-align:middle}
th{color:var(--accent);background:#11141d}
tr:hover td{background:#1c2130}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;color:var(--muted)}
.matrix-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}.matrix td,.matrix th{min-width:74px;text-align:center}.matrix th:first-child,.matrix td:first-child{position:sticky;left:0;background:#121620;text-align:left;min-width:210px;z-index:3}
.hit{font-weight:900;color:var(--accent2)}.blank{color:#555}.rank{display:flex;flex-direction:column;gap:8px}.bar{height:9px;background:#2a3040;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.importer{display:grid;grid-template-columns:1fr;gap:10px}.footer{color:var(--muted);font-size:12px;margin-top:24px;line-height:1.7}
@media(max-width:780px){.grid{grid-template-columns:repeat(2,1fr)}h1{font-size:20px}th,td{font-size:12px;padding:8px}.card{padding:13px}}

.sameRow td{background:rgba(126,231,200,.04)}
.diffRow td{background:rgba(255,211,106,.08)}
.samePill{color:var(--accent2);border-color:rgba(126,231,200,.45)}
.diffPill{color:var(--accent);border-color:rgba(255,211,106,.55);font-weight:900}


.legend{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px}
.legendItem{border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;border:1px solid var(--line)}
.legendItem.common{background:rgba(126,231,200,.16);color:var(--accent2);border-color:rgba(126,231,200,.5)}
.legendItem.sat{background:rgba(255,211,106,.16);color:var(--accent);border-color:rgba(255,211,106,.55)}
.legendItem.sun{background:rgba(133,170,255,.17);color:#a9beff;border-color:rgba(133,170,255,.55)}
.legendItem.first{background:rgba(255,125,125,.20);color:#ffb1b1;border-color:rgba(255,125,125,.65)}
.commonRow td{background:rgba(126,231,200,.045)!important}
.satRow td{background:rgba(255,211,106,.095)!important}
.sunRow td{background:rgba(133,170,255,.105)!important}
.swapRow td{background:rgba(255,255,255,.035)!important}
.firstRow td{background:linear-gradient(90deg,rgba(255,125,125,.20),rgba(255,211,106,.10))!important;border-top:1px solid rgba(255,125,125,.35);border-bottom:1px solid rgba(255,125,125,.35)}
.commonRowPill{color:var(--accent2);border-color:rgba(126,231,200,.55);font-weight:900}
.satRowPill{color:var(--accent);border-color:rgba(255,211,106,.65);font-weight:900}
.sunRowPill{color:#a9beff;border-color:rgba(133,170,255,.65);font-weight:900}
.swapRowPill{color:var(--muted);border-color:var(--line);font-weight:900}
.firstRowPill{color:#ffb1b1;border-color:rgba(255,125,125,.75);font-weight:900}
.firstMark{display:inline-block;margin-left:8px;color:#ffb1b1;font-size:12px;font-weight:900}
.commonBorder{border-color:rgba(126,231,200,.45)!important}
.satBorder{border-color:rgba(255,211,106,.50)!important}
.sunBorder{border-color:rgba(133,170,255,.50)!important}
.firstBorder{border-color:rgba(255,125,125,.65)!important}


/* 2days comparison v2: cell based coloring */
.rowCommon td{background:transparent!important}
.rowSwap td{background:transparent!important}
.rowFirst td{background:transparent!important}
.cellCommon{background:rgba(126,231,200,.13)!important;border-left:3px solid rgba(126,231,200,.65)}
.cellSaturday{background:rgba(255,211,106,.16)!important;border-left:3px solid rgba(255,211,106,.75)}
.cellSunday{background:rgba(133,170,255,.18)!important;border-left:3px solid rgba(133,170,255,.75)}
.cellFirstSunday12{background:linear-gradient(90deg,rgba(255,125,125,.32),rgba(255,211,106,.16))!important;border-left:4px solid rgba(255,125,125,.9);font-weight:900}
.rowCommonPill{color:var(--accent2);border-color:rgba(126,231,200,.55);font-weight:900}
.rowSwapPill{color:var(--muted);border-color:var(--line);font-weight:900}
.rowFirstPill{color:#ffb1b1;border-color:rgba(255,125,125,.75);font-weight:900}


.changeBox{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025)}
.changeBox h3{margin:0 0 8px;font-size:16px}
.miniTable th,.miniTable td{font-size:13px;padding:8px 10px}
.oldSong{color:var(--muted)}
.newSong{color:var(--accent);font-weight:900}
.changedLine td{background:rgba(255,211,106,.08)!important}
#import .danger{background:var(--danger)}
#replaceBtn,#clearBtn{margin-top:0}
#clearBtn{color:#ffb1b1;border-color:rgba(255,125,125,.45)}


.tourbar{display:flex;gap:8px;overflow-x:auto;margin:0 0 16px;padding:4px 0 12px;border-bottom:1px solid var(--line)}
.tourBtn{border-radius:14px;padding:10px 14px;background:#11141d;color:var(--text);border:1px solid var(--line);font-weight:900}
.tourBtn.active{background:var(--accent);color:#151515;border-color:var(--accent)}
.tourBtn small{display:block;font-size:10px;font-weight:700;opacity:.72;margin-top:2px}

</style>
</head>

<header>
  <h1>B'z FYOP＋ Setlist Tracker</h1>
  <div class="sub">B'zライブのセットリストを公演別・ツアー別に見やすく整理</div>
</header>

  <button data-tab="dash" class="active">Dashboard</button>

</nav>

<script>
let data = JSON.parse(localStorage.getItem("bzData") || JSON.stringify(window.BZ_DATA));
let selectedTour = localStorage.getItem("selectedTour") || "FYOP+";
function allTours(){ return data.tours || []; }
function visibleShows(){ return data.shows.filter(s => selectedTour==="ALL" || (s.tour || "FYOP+")===selectedTour); }
function visibleShowIds(){ return new Set(visibleShows().map(s=>s.id)); }
function renderTourBar(){
  const items=[{id:"ALL",label:"全部",year:""}].concat(allTours());
  return `<div class="tourbar">${items.map(t=>`<button class="tourBtn ${selectedTour===t.id?'active':''}" data-tour="${t.id}">${t.label}${t.year?`<small>${t.year}</small>`:""}</button>`).join("")}</div>`;
}
function bindTourBar(){
  document.querySelectorAll(".tourBtn").forEach(btn=>btn.onclick=()=>{
    selectedTour=btn.dataset.tour;
    localStorage.setItem("selectedTour", selectedTour);
    const active=document.querySelector("nav button.active");
    render(active ? active.dataset.tab : "dash");
  });
}
function setApp(html){ app.innerHTML = renderTourBar() + html; bindTourBar(); }
const app = document.querySelector("#app");
const tabs = document.querySelectorAll("nav button");
tabs.forEach(b=>b.onclick=()=>{tabs.forEach(x=>x.classList.remove("active"));b.classList.add("active");render(b.dataset.tab)});
function showMap(){return Object.fromEntries(data.shows.map(s=>[s.id,s]))}
function rows(){ const ids=visibleShowIds(); return data.setlists.filter(r=>ids.has(r.showId) && r.song && r.song.trim())}
function songCounts(){
  const m={}; rows().forEach(r=>m[r.song]=(m[r.song]||0)+1);
  return Object.entries(m).map(([song,count])=>({song,count})).sort((a,b)=>b.count-a.count||a.song.localeCompare(b.song,'ja'));
}
function changesFromPrev(showId){
  const shows = visibleShows().map(s=>s.id);
  const i = shows.indexOf(showId);
  if(i <= 0) return [];
  const prevId = shows[i-1];
  const out = [];
  for(let order=1; order<=20; order++){
    const before = songAt(prevId, order);
    const after = songAt(showId, order);
    if(after && before && before !== after){
      out.push({order, before, after});
    }else if(after && !before){
      out.push({order, before:"未入力", after});
    }
  }
  return out;
}
function render(tab="dash"){
 if(tab==="dash") return renderDash();
 if(tab==="shows") return renderShows();
 if(tab==="songs") return renderSongs();
 if(tab==="matrix") return renderMatrix();
 if(tab==="pairs") return renderPairs();
 if(tab==="import") return renderImport();
}
function renderDash(){
 const done = visibleShows().filter(s=>s.status==="入力済").length;
 const totalSongs = songCounts().length;
 const top = songCounts().slice(0,8);
 setApp(`
 <div class="grid">
  <div class="card"><div class="muted">登録公演</div><div class="big">${done}/${visibleShows().length}</div></div>
  <div class="card"><div class="muted">曲数</div><div class="big">${totalSongs}</div></div>
  <div class="card"><div class="muted">総演奏データ</div><div class="big">${rows().length}</div></div>
  <div class="card"><div class="muted">最終更新</div><div class="big" style="font-size:20px">${data.updated}</div></div>
 </div>
 <div class="card" style="margin-top:14px"><h2>出現回数 上位</h2><div class="rank">
 ${top.map(x=>`<div><b>${x.song}</b> <span class="pill">${x.count}回</span><div class="bar"><i style="width:${x.count/done*100}%"></i></div></div>`).join("")}
 </div></div>
 <div class="footer">出典メモ：${data.source}。公開する場合は、元ページへのリンク・出典表記を添えるのがおすすめです。</div>`);
}
function renderShows(){
 const list=visibleShows();
 const opts=list.map(s=>`<option value="${s.id}">${s.label} ${s.venue}</option>`).join("");
 if(!list.length){ setApp(`<div class="card">このツアーの公演データはまだありません。</div>`); return; }
 setApp(`<div class="controls"><select id="showSel">${opts}</select></div><div id="showBox"></div>`);
 const sel=document.querySelector("#showSel"); sel.onchange=()=>drawShow(sel.value); drawShow(sel.value);
}
function drawShow(id){
 const s=showMap()[id], r=data.setlists.filter(x=>x.showId===id).sort((a,b)=>a.order-b.order);
 const changes=changesFromPrev(id);
 const changesHtml = changes.length ? `
 <div class="changeBox">
   <h3>前公演から変更があった曲</h3>
   <table class="miniTable"><thead><tr><th>曲順</th><th>前公演</th><th>今回</th></tr></thead><tbody>
   ${changes.map(x=>`<tr><td>${x.order}</td><td class="oldSong">${x.before}</td><td class="newSong">${x.after}</td></tr>`).join("")}
   </tbody></table>
 </div>` : `<div class="changeBox muted">前公演からの曲順変更はありません。</div>`;

 document.querySelector("#showBox").innerHTML=`<div class="card"><h2>${s.label} ${s.venue}</h2><div class="muted">${s.date} / ${s.area} / ${s.status}</div>
 ${changesHtml}
 <table><thead><tr><th>曲順</th><th>曲名</th><th>区分</th></tr></thead><tbody>
 ${Array.from({length:20},(_,i)=>{
  const x=r.find(y=>y.order===i+1)||{song:"",section:i>=18?"Encore":"Main"};
  const changed = changes.some(c=>c.order===i+1);
  return `<tr class="${changed?'changedLine':''}"><td>${i+1}</td><td>${x.song||"<span class='blank'>未入力</span>"}</td><td>${x.section}</td></tr>`
 }).join("")}</tbody></table></div>`;
}
function renderSongs(){
 const done=visibleShows().filter(s=>s.status==="入力済").length;
 setApp(`<div class="card"><h2>曲別ランキング</h2><table><thead><tr><th>#</th><th>曲名</th><th>回数</th><th>出現率</th></tr></thead><tbody>
 ${songCounts().map((x,i)=>`<tr><td>${i+1}</td><td>${x.song}</td><td>${x.count}</td><td>${Math.round(x.count/done*100)}%</td></tr>`).join("")}
 </tbody></table></div>`);
}
function renderMatrix(){
 const songs=songCounts().map(x=>x.song);
 const doneShows=visibleShows().filter(s=>s.status==="入力済");
 setApp(`<div class="matrix-wrap"><table class="matrix"><thead><tr><th>曲名</th>${doneShows.map(s=>`<th>${s.label}<br>${s.area}</th>`).join("")}<th>計</th></tr></thead><tbody>
 ${songs.map(song=>{
  const cells=doneShows.map(s=>rows().some(r=>r.showId===s.id&&r.song===song)?`<td class="hit">●</td>`:`<td class="blank">—</td>`).join("");
  const c=songCounts().find(x=>x.song===song).count;
  return `<tr><td>${song}</td>${cells}<td>${c}</td></tr>`;
 }).join("")}</tbody></table></div>`;
}



function showPairs(){
 const done=visibleShows().filter(s=>s.status==="入力済");
 const groups=[];
 for(let i=0;i<done.length;i++){
   const a=done[i], b=done[i+1];
   if(b && a.venue===b.venue){
     groups.push([a,b]); i++;
   }
 }
 return groups;
}
function songAt(showId, order){
 const x=data.setlists.find(r=>r.showId===showId && r.order===order);
 return x && x.song ? x.song : "";
}
function renderPairs(){
 const groups=showPairs();
 if(!groups.length){setApp('<div class="card">比較できる2days公演がありません。</div>');return;}
 const opts=groups.map((g,idx)=>`<option value="${idx}">${g[0].area}｜${g[0].label}・${g[1].label}｜${g[0].venue}</option>`).join("");
 setApp(`<div class="controls"><select id="pairSel">${opts}</select></div><div id="pairBox"></div>`);
 const sel=document.querySelector("#pairSel"); sel.onchange=()=>drawPair(groups[Number(sel.value)]); drawPair(groups[0]);
}
function drawPair(pair){
 const [sat,sun]=pair;
 const satSongs = new Set(rows().filter(r=>r.showId===sat.id).map(r=>r.song));
 const sunSongs = new Set(rows().filter(r=>r.showId===sun.id).map(r=>r.song));

 let common=0, satOnly=0, sunOnly=0, sunday12=0;

 const rowsHtml=Array.from({length:20},(_,i)=>{
   const order=i+1;
   const sa=songAt(sat.id,order);
   const sb=songAt(sun.id,order);

   const same = sa && sb && sa===sb;
   const satOnlyFlag = sa && !sunSongs.has(sa);
   const sunOnlyFlag = sb && !satSongs.has(sb);
   const sunday12Flag = order===12 && sb && sunOnlyFlag;

   let rowLabel = "";
   let satClass = "";
   let sunClass = "";
   let rowClass = "";

   if(same){
     common++;
     rowLabel="共通枠";
     rowClass="rowCommon";
     satClass="cellCommon";
     sunClass="cellCommon";
   }else{
     rowLabel="日替わり枠";
     rowClass="rowSwap";
     if(satOnlyFlag){ satOnly++; satClass="cellSaturday"; }
     if(sunOnlyFlag){ sunOnly++; sunClass="cellSunday"; }
     if(sunday12Flag){ sunday12++; sunClass="cellFirstSunday12"; rowLabel="日曜12曲目・初登場枠"; rowClass="rowFirst"; }
   }

   return `<tr class="${rowClass}">
     <td>${order}</td>
     <td><span class="pill ${rowClass}Pill">${rowLabel}</span></td>
     <td class="${satClass}">${sa||"<span class='blank'>未入力</span>"}</td>
     <td class="${sunClass}">${sb||"<span class='blank'>未入力</span>"}${sunday12Flag?` <span class="firstMark">★日曜12曲目</span>`:""}</td>
   </tr>`;
 }).join("");

 document.querySelector("#pairBox").innerHTML=`<div class="card">
   <h2>${sat.area} 2days分析</h2>
   <div class="muted">${sat.label} / ${sun.label}　${sat.venue}</div>

   <div class="legend">
     <span class="legendItem common">土日共通</span>
     <span class="legendItem sat">土曜だけ</span>
     <span class="legendItem sun">日曜だけ</span>
     <span class="legendItem first">日曜12曲目</span>
   </div>

   <div class="grid" style="margin-top:14px">
     <div class="card miniCard commonBorder"><div class="muted">土日共通曲</div><div class="big">${common}</div></div>
     <div class="card miniCard satBorder"><div class="muted">土曜だけ</div><div class="big">${satOnly}</div></div>
     <div class="card miniCard sunBorder"><div class="muted">日曜だけ</div><div class="big">${sunOnly}</div></div>
     <div class="card miniCard firstBorder"><div class="muted">日曜12曲目</div><div class="big">${sunday12}</div></div>
   </div>

   <table><thead><tr><th>曲順</th><th>分類</th><th>土曜日</th><th>日曜日</th></tr></thead><tbody>${rowsHtml}</tbody></table>

   <div class="footer">
     見方：同じ曲は「土日共通」。片方だけ出る曲は、土曜側・日曜側のセルだけ色を付けています。日曜12曲目は特別枠として強調しています。
   </div>
 </div>`;
}
function renderImport(){
 const opts=visibleShows().map(s=>`<option value="${s.id}">${s.label} ${s.venue}</option>`).join("");
 if(!visibleShows().length){ setApp(`<div class="card">このツアーの公演データはまだありません。</div>`); return; }
 setApp(`<div class="card importer"><h2>追記・整形</h2>
 <p class="muted">セトリを貼り付けて「整形」→「このブラウザに保存」。保存は追記・更新式です。同じ曲順だけ上書きし、他の曲順は残します。</p>
 <select id="importShow">${opts}</select>
 <textarea id="paste" rows="10" placeholder="1. FAITH?\n2. 濁流BOY\n...\nアンコール\n19. その先へ"></textarea>
 <button id="parseBtn">整形する</button>
 <textarea id="out" rows="10" placeholder="ここに整形結果が出ます"></textarea>
 <button id="saveBtn">このブラウザに保存（追記・更新）</button>
 <button id="replaceBtn">この公演を全上書き</button>
 <button id="clearBtn">この公演を空にする</button>
 <p class="muted">保存後はDashboard/公演別/マトリクスに反映されます。</p></div>`);
 document.querySelector("#parseBtn").onclick=()=>{
  const id=document.querySelector("#importShow").value;
  const lines=document.querySelector("#paste").value.split(/\n/);
  const parsed=[];
  for(const line of lines){
    const m=line.trim().match(/^(\d+)[\.\s、\)]\s*(.+)$/);
    if(m && m[2].trim() && !m[2].includes("B'zのLIVE-GYM")){
      parsed.push({showId:id,order:Number(m[1]),song:m[2].trim(),section:Number(m[1])>=19?"Encore":"Main"});
    }
  }
  document.querySelector("#out").value=JSON.stringify(parsed,null,2);
 };
 function readParsed(){
  let parsed=[]; 
  try{parsed=JSON.parse(document.querySelector("#out").value)}
  catch(e){alert("整形結果がJSONではありません");return null}
  return parsed.filter(x=>x && x.showId && x.order && x.song);
 }
 function persist(id){
  data.shows=data.shows.map(s=>s.id===id?{...s,status:"入力済"}:s);
  data.updated=new Date().toISOString().slice(0,10);
  localStorage.setItem("bzData",JSON.stringify(data));
 }
 document.querySelector("#saveBtn").onclick=()=>{
  const parsed=readParsed(); if(!parsed)return;
  const id=document.querySelector("#importShow").value;
  const keep=data.setlists.filter(r=>!(r.showId===id && parsed.some(p=>p.order===r.order)));
  data.setlists=keep.concat(parsed);
  persist(id);
  alert("追記・更新しました。同じ曲順は新しい内容に置き換え、他の曲順は残しています。");
 };
 document.querySelector("#replaceBtn").onclick=()=>{
  const parsed=readParsed(); if(!parsed)return;
  const id=document.querySelector("#importShow").value;
  data.setlists=data.setlists.filter(r=>r.showId!==id).concat(parsed);
  persist(id);
  alert("この公演を全上書きしました。");
 };
 document.querySelector("#clearBtn").onclick=()=>{
  const id=document.querySelector("#importShow").value;
  if(!confirm("この公演のセトリを空にします。よろしいですか？"))return;
  data.setlists=data.setlists.filter(r=>r.showId!==id);
  data.shows=data.shows.map(s=>s.id===id?{...s,status:"未入力"}:s);
  data.updated=new Date().toISOString().slice(0,10);
  localStorage.setItem("bzData",JSON.stringify(data));
  alert("この公演を空にしました。");
 };
}
render();
</script>
</body></html>
