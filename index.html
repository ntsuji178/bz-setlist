:root{--bg:#0f1117;--panel:#171a23;--panel2:#202432;--text:#f5f7fb;--muted:#a9b0c3;--line:#313749;--accent:#ffd36a;--accent2:#7ee7c8;--danger:#ff7d7d;--blue:#9fb8ff}
*{box-sizing:border-box}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:linear-gradient(180deg,#0f1117,#141824);color:var(--text)}
header{padding:22px 18px 14px;border-bottom:1px solid var(--line);position:sticky;top:0;background:rgba(15,17,23,.92);backdrop-filter:blur(12px);z-index:10}
h1{font-size:24px;margin:0 0 6px;letter-spacing:.03em}h2{margin:0 0 10px}h3{margin:8px 0}
.sub{color:var(--muted);font-size:13px}
nav{display:flex;gap:8px;overflow-x:auto;padding:12px 18px;border-bottom:1px solid var(--line)}
button,.btn{background:var(--panel2);border:1px solid var(--line);color:var(--text);border-radius:999px;padding:9px 13px;font-weight:700;cursor:pointer;white-space:nowrap}
button.active,.btn.active{background:var(--accent);color:#151515;border-color:var(--accent)}
main{padding:18px;max-width:1180px;margin:auto}
.tourbar{display:flex;gap:8px;overflow-x:auto;margin:0 0 16px;padding:4px 0 12px;border-bottom:1px solid var(--line)}
.tourBtn{border-radius:14px;padding:10px 14px;background:#11141d;color:var(--text);border:1px solid var(--line);font-weight:900}
.tourBtn.active{background:var(--accent);color:#151515;border-color:var(--accent)}
.tourBtn small{display:block;font-size:10px;font-weight:700;opacity:.72;margin-top:2px}
.grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:16px;box-shadow:0 10px 30px rgba(0,0,0,.18)}
.big{font-size:28px;font-weight:900}.muted{color:var(--muted);font-size:13px}.controls{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}
select,input,textarea{background:#0c0e14;color:var(--text);border:1px solid var(--line);border-radius:12px;padding:10px;font-size:14px;min-width:260px}
textarea{width:100%;min-width:0;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;line-height:1.55}
table{width:100%;border-collapse:separate;border-spacing:0;margin-top:12px;overflow:hidden;border-radius:14px}
th,td{border-bottom:1px solid var(--line);padding:11px 13px;text-align:left;font-size:14px;vertical-align:middle}
th{color:var(--accent);background:#11141d}
tr:hover td{background:#1c2130}.pill{display:inline-flex;border:1px solid var(--line);border-radius:999px;padding:4px 9px;font-size:12px;color:var(--muted)}
.matrix-wrap{overflow:auto;border:1px solid var(--line);border-radius:16px}.matrix td,.matrix th{min-width:74px;text-align:center}.matrix th:first-child,.matrix td:first-child{position:sticky;left:0;background:#121620;text-align:left;min-width:210px;z-index:3}
.hit{font-weight:900;color:var(--accent2)}.blank{color:#555}.rank{display:flex;flex-direction:column;gap:8px}.bar{height:9px;background:#2a3040;border-radius:999px;overflow:hidden}.bar i{display:block;height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2))}
.footer{color:var(--muted);font-size:12px;margin-top:24px;line-height:1.7}
.changeBox{margin:16px 0;padding:14px;border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.025)}
.oldSong{color:var(--muted)}.newSong{color:var(--accent);font-weight:900}.changedLine td{background:rgba(255,211,106,.08)!important}
.legend{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0 4px}.legendItem{border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;border:1px solid var(--line)}
.legendItem.common{background:rgba(126,231,200,.16);color:var(--accent2);border-color:rgba(126,231,200,.5)}.legendItem.sat{background:rgba(255,211,106,.16);color:var(--accent);border-color:rgba(255,211,106,.55)}.legendItem.sun{background:rgba(133,170,255,.17);color:#a9beff;border-color:rgba(133,170,255,.55)}.legendItem.first{background:rgba(255,125,125,.20);color:#ffb1b1;border-color:rgba(255,125,125,.65)}
.cellCommon{background:rgba(126,231,200,.13)!important;border-left:3px solid rgba(126,231,200,.65)}.cellSaturday{background:rgba(255,211,106,.16)!important;border-left:3px solid rgba(255,211,106,.75)}.cellSunday{background:rgba(133,170,255,.18)!important;border-left:3px solid rgba(133,170,255,.75)}.cellFirstSunday12{background:linear-gradient(90deg,rgba(255,125,125,.32),rgba(255,211,106,.16))!important;border-left:4px solid rgba(255,125,125,.9);font-weight:900}
.firstMark{display:inline-block;margin-left:8px;color:#ffb1b1;font-size:12px;font-weight:900}.danger{color:#ffb1b1;border-color:rgba(255,125,125,.45)}
.formgrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}.formgrid label{display:flex;flex-direction:column;gap:5px;color:var(--muted);font-size:12px}.formgrid input,.formgrid select{min-width:0;width:100%}
.notice{background:rgba(255,211,106,.08);border:1px solid rgba(255,211,106,.25);border-radius:14px;padding:12px;margin:12px 0;color:#f5d98f}
@media(max-width:780px){.grid{grid-template-columns:repeat(2,1fr)}.formgrid{grid-template-columns:1fr}h1{font-size:20px}th,td{font-size:12px;padding:8px}.card{padding:13px}}
</style>
</head>

let data = JSON.parse(localStorage.getItem("bzData_v4") || JSON.stringify(window.BZ_DATA));
let selectedTour = localStorage.getItem("selectedTour_v4") || "FYOP+";
const app = document.querySelector("#app");
const navBtns = document.querySelectorAll("nav button");
navBtns.forEach(b=>b.onclick=()=>{navBtns.forEach(x=>x.classList.remove("active"));b.classList.add("active");render(b.dataset.tab)});

function saveLocal(){ localStorage.setItem("bzData_v4", JSON.stringify(data)); }
function tours(){return data.tours || []}
function visibleShows(){return data.shows.filter(s=>selectedTour==="ALL" || s.tour===selectedTour).sort((a,b)=>a.id.localeCompare(b.id))}
function visibleIds(){return new Set(visibleShows().map(s=>s.id))}
function rows(){const ids=visibleIds(); return data.setlists.filter(r=>ids.has(r.showId)&&r.song&&r.song.trim()).sort((a,b)=>a.showId.localeCompare(b.showId)||a.order-b.order)}
function showMap(){return Object.fromEntries(data.shows.map(s=>[s.id,s]))}
function setApp(html){app.innerHTML = tourBar()+html; bindTourBar();}
function tourBar(){
 const items=[{id:"ALL",label:"全部",year:""}].concat(tours());
 return `<div class="tourbar">${items.map(t=>`<button class="tourBtn ${selectedTour===t.id?'active':''}" data-tour="${t.id}">${t.label}${t.year?`<small>${t.year}</small>`:""}</button>`).join("")}</div>`;
}
function bindTourBar(){
 document.querySelectorAll(".tourBtn").forEach(btn=>btn.onclick=()=>{selectedTour=btn.dataset.tour; localStorage.setItem("selectedTour_v4", selectedTour); const active=document.querySelector("nav button.active"); render(active?active.dataset.tab:"dash");});
}
function songCounts(){
 const m={}; rows().forEach(r=>m[r.song]=(m[r.song]||0)+1);
 return Object.entries(m).map(([song,count])=>({song,count})).sort((a,b)=>b.count-a.count||a.song.localeCompare(b.song,'ja'));
}
function songAt(showId, order){const x=data.setlists.find(r=>r.showId===showId && r.order===order); return x?x.song:""}
function changesFromPrev(showId){
 const shows=visibleShows().map(s=>s.id); const i=shows.indexOf(showId); if(i<=0)return [];
 const prevId=shows[i-1], out=[];
 for(let order=1;order<=30;order++){const before=songAt(prevId,order), after=songAt(showId,order); if(after&&before&&before!==after)out.push({order,before,after}); else if(after&&!before)out.push({order,before:"未入力",after});}
 return out;
}
function render(tab="dash"){ if(tab==="dash")renderDash(); if(tab==="shows")renderShows(); if(tab==="songs")renderSongs(); if(tab==="matrix")renderMatrix(); if(tab==="pairs")renderPairs(); if(tab==="import")renderImport(); if(tab==="data")renderData(); }

function renderDash(){
 const done=visibleShows().filter(s=>s.status==="入力済").length, total=visibleShows().length, totalSongs=songCounts().length, top=songCounts().slice(0,8);
 setApp(`
 <div class="grid">
  <div class="card"><div class="muted">登録公演</div><div class="big">${done}/${total}</div></div>
  <div class="card"><div class="muted">曲数</div><div class="big">${totalSongs}</div></div>
  <div class="card"><div class="muted">総演奏データ</div><div class="big">${rows().length}</div></div>
  <div class="card"><div class="muted">最終更新</div><div class="big" style="font-size:20px">${data.updated||""}</div></div>
 </div>
 <div class="card" style="margin-top:14px"><h2>出現回数 上位</h2>
 ${top.length?`<div class="rank">${top.map(x=>`<div><b>${x.song}</b> <span class="pill">${x.count}回</span><div class="bar"><i style="width:${done?Math.min(100,x.count/done*100):0}%"></i></div></div>`).join("")}</div>`:`<div class="muted">このツアーのデータはまだありません。</div>`}
 </div>
 <div class="footer">公開ページを見る人は閲覧用です。追記・整形で保存した内容は、その端末内だけに保存されます。</div>`);
}
function renderShows(){
 const list=visibleShows(); if(!list.length){setApp(`<div class="card">このツアーの公演データはまだありません。「追記・整形」で公演を追加できます。</div>`);return;}
 const opts=list.map(s=>`<option value="${s.id}">${s.label}｜${s.area}｜${s.venue}</option>`).join("");
 setApp(`<div class="controls"><select id="showSel">${opts}</select></div><div id="showBox"></div>`);
 const sel=document.querySelector("#showSel"); sel.onchange=()=>drawShow(sel.value); drawShow(sel.value);
}
function drawShow(id){
 const s=showMap()[id], r=data.setlists.filter(x=>x.showId===id).sort((a,b)=>a.order-b.order), changes=changesFromPrev(id);
 const max=Math.max(20, ...r.map(x=>x.order), 0);
 const changesHtml=changes.length?`<div class="changeBox"><h3>前公演から変更があった曲</h3><table><thead><tr><th>曲順</th><th>前公演</th><th>今回</th></tr></thead><tbody>${changes.map(x=>`<tr><td>${x.order}</td><td class="oldSong">${x.before}</td><td class="newSong">${x.after}</td></tr>`).join("")}</tbody></table></div>`:`<div class="changeBox muted">前公演からの曲順変更はありません。</div>`;
 document.querySelector("#showBox").innerHTML=`<div class="card"><h2>${s.label} ${s.venue}</h2><div class="muted">${s.date} / ${s.area} / ${s.tour} / ${s.status}</div>${changesHtml}<table><thead><tr><th>曲順</th><th>曲名</th><th>区分</th></tr></thead><tbody>${Array.from({length:max},(_,i)=>{const x=r.find(y=>y.order===i+1)||{song:"",section:i>=18?"Encore":"Main"}; const changed=changes.some(c=>c.order===i+1); return `<tr class="${changed?'changedLine':''}"><td>${i+1}</td><td>${x.song||"<span class='blank'>未入力</span>"}</td><td>${x.section||""}</td></tr>`}).join("")}</tbody></table></div>`;
}
function renderSongs(){
 const done=visibleShows().filter(s=>s.status==="入力済").length;
 setApp(`<div class="card"><h2>曲別ランキング</h2>${songCounts().length?`<table><thead><tr><th>#</th><th>曲名</th><th>回数</th><th>出現率</th></tr></thead><tbody>${songCounts().map((x,i)=>`<tr><td>${i+1}</td><td>${x.song}</td><td>${x.count}</td><td>${done?Math.round(x.count/done*100):0}%</td></tr>`).join("")}</tbody></table>`:`<div class="muted">データがありません。</div>`}</div>`);
}
function renderMatrix(){
 const songs=songCounts().map(x=>x.song), doneShows=visibleShows().filter(s=>s.status==="入力済");
 if(!songs.length){setApp(`<div class="card">マトリクス表示できるデータがありません。</div>`);return;}
 setApp(`<div class="matrix-wrap"><table class="matrix"><thead><tr><th>曲名</th>${doneShows.map(s=>`<th>${s.label}<br>${s.area}</th>`).join("")}<th>計</th></tr></thead><tbody>${songs.map(song=>{const cells=doneShows.map(s=>rows().some(r=>r.showId===s.id&&r.song===song)?`<td class="hit">●</td>`:`<td class="blank">—</td>`).join(""); const c=songCounts().find(x=>x.song===song).count; return `<tr><td>${song}</td>${cells}<td>${c}</td></tr>`}).join("")}</tbody></table></div>`);
}
function renderPairs(){
 const done=visibleShows().filter(s=>s.status==="入力済"), groups=[];
 for(let i=0;i<done.length;i++){const a=done[i],b=done[i+1]; if(b&&a.venue===b.venue){groups.push([a,b]);i++;}}
 if(!groups.length){setApp(`<div class="card">比較できる2days公演がありません。</div>`);return;}
 const opts=groups.map((g,i)=>`<option value="${i}">${g[0].area}｜${g[0].label}・${g[1].label}｜${g[0].venue}</option>`).join("");
 setApp(`<div class="controls"><select id="pairSel">${opts}</select></div><div id="pairBox"></div>`);
 const sel=document.querySelector("#pairSel"); sel.onchange=()=>drawPair(groups[Number(sel.value)]); drawPair(groups[0]);
}
function drawPair(pair){
 const [sat,sun]=pair, satSongs=new Set(data.setlists.filter(r=>r.showId===sat.id).map(r=>r.song)), sunSongs=new Set(data.setlists.filter(r=>r.showId===sun.id).map(r=>r.song));
 const max=Math.max(20, ...data.setlists.filter(r=>r.showId===sat.id||r.showId===sun.id).map(r=>r.order), 0);
 let common=0,satOnly=0,sunOnly=0,sunday12=0;
 const body=Array.from({length:max},(_,i)=>{const order=i+1, sa=songAt(sat.id,order), sb=songAt(sun.id,order); const same=sa&&sb&&sa===sb, sof=sa&&!sunSongs.has(sa), suof=sb&&!satSongs.has(sb), f=order===12&&sb&&suof; let label=same?"共通枠":(f?"日曜12曲目・初登場枠":"日替わり枠"), sc=same?"cellCommon":(sof?"cellSaturday":""), uc=same?"cellCommon":(f?"cellFirstSunday12":(suof?"cellSunday":"")); if(same)common++; if(sof)satOnly++; if(suof)sunOnly++; if(f)sunday12++; return `<tr><td>${order}</td><td><span class="pill">${label}</span></td><td class="${sc}">${sa||"<span class='blank'>未入力</span>"}</td><td class="${uc}">${sb||"<span class='blank'>未入力</span>"}${order===10&&sb?` <span class="firstMark">★日曜10曲目</span>`:""}${f?` <span class="firstMark">★日曜12曲目</span>`:""}</td></tr>`;}).join("");
 document.querySelector("#pairBox").innerHTML=`<div class="card"><h2>${sat.area} 2days分析</h2><div class="muted">${sat.label} / ${sun.label}　${sat.venue}</div><div class="legend"><span class="legendItem common">土日共通</span><span class="legendItem sat">土曜だけ</span><span class="legendItem sun">日曜だけ</span><span class="legendItem first">日曜12曲目</span></div><div class="grid" style="margin-top:14px"><div class="card"><div class="muted">土日共通曲</div><div class="big">${common}</div></div><div class="card"><div class="muted">土曜だけ</div><div class="big">${satOnly}</div></div><div class="card"><div class="muted">日曜だけ</div><div class="big">${sunOnly}</div></div><div class="card"><div class="muted">日曜12曲目</div><div class="big">${sunday12}</div></div></div><table><thead><tr><th>曲順</th><th>分類</th><th>土曜日</th><th>日曜日</th></tr></thead><tbody>${body}</tbody></table></div>`;
}
function parseSongs(text, showId){
 const lines=text.split(/\n/).map(x=>x.trim()).filter(Boolean), out=[]; let n=1;
 for(const line of lines){
   if(/^(SHOWCASE|FYOP|FYOD|B'z|アンコール|Encore|ENCORE)/i.test(line)) continue;
   const m=line.match(/^(\d+)[\.．\)）\s、-]+(.+)$/);
   if(m) out.push({showId,order:Number(m[1]),song:m[2].trim(),section:Number(m[1])>=19?"Encore":"Main"});
   else out.push({showId,order:n++,song:line,section:n>=20?"Encore":"Main"});
 }
 return out;
}
function renderImport(){
 const tourOpts=tours().map(t=>`<option value="${t.id}" ${selectedTour===t.id?'selected':''}>${t.label} ${t.year||""}</option>`).join("");
 const showOpts=visibleShows().map(s=>`<option value="${s.id}">${s.label}｜${s.area}｜${s.venue}</option>`).join("");
 setApp(`<div class="card"><h2>追記・整形</h2><div class="notice">既存公演を選んで追記できます。公演が無いツアーは、下の「新規公演追加」で作れます。</div><h3>既存公演に追加・更新</h3><div class="controls"><select id="existingShow">${showOpts||'<option value="">先に新規公演を追加してください</option>'}</select></div><textarea id="paste" rows="10" placeholder="1. FAITH?\n2. 濁流BOY\nまたは曲名だけを1行ずつ"></textarea><div class="controls"><button id="parseBtn">整形する</button><button id="saveMergeBtn">保存（追記・更新）</button><button id="saveReplaceBtn">この公演を全上書き</button></div><textarea id="out" rows="8" placeholder="整形結果"></textarea></div><div class="card" style="margin-top:14px"><h2>新規公演追加</h2><div class="formgrid"><label>ツアー<select id="newTour">${tourOpts}</select></label><label>日付<input id="newDate" placeholder="2026/5/3"></label><label>表示ラベル<input id="newLabel" placeholder="5.3（日）"></label><label>エリア<input id="newArea" placeholder="仙台"></label><label>会場<input id="newVenue" placeholder="SENDAI GIGS"></label><label>種別<select id="newType"><option>ARENA</option><option>SHOWCASE</option><option>FC</option></select></label></div><div class="controls"><button id="addShowBtn">公演を追加</button></div></div>`);
 const p=document.querySelector("#parseBtn"), out=document.querySelector("#out"), paste=document.querySelector("#paste"), sel=document.querySelector("#existingShow");
 p.onclick=()=>{ if(!sel.value){alert("先に公演を選ぶか、新規公演を追加してください");return;} out.value=JSON.stringify(parseSongs(paste.value,sel.value),null,2); };
 function readParsed(){try{return JSON.parse(out.value).filter(x=>x.showId&&x.order&&x.song)}catch(e){alert("先に整形してください");return null}}
 document.querySelector("#saveMergeBtn").onclick=()=>{const parsed=readParsed(); if(!parsed)return; const id=sel.value; data.setlists=data.setlists.filter(r=>!(r.showId===id&&parsed.some(p=>p.order===r.order))).concat(parsed); data.shows=data.shows.map(s=>s.id===id?{...s,status:"入力済"}:s); data.updated=new Date().toISOString().slice(0,10); saveLocal(); alert("追記・更新しました"); render("shows");};
 document.querySelector("#saveReplaceBtn").onclick=()=>{const parsed=readParsed(); if(!parsed)return; const id=sel.value; data.setlists=data.setlists.filter(r=>r.showId!==id).concat(parsed); data.shows=data.shows.map(s=>s.id===id?{...s,status:"入力済"}:s); data.updated=new Date().toISOString().slice(0,10); saveLocal(); alert("全上書きしました"); render("shows");};
 document.querySelector("#addShowBtn").onclick=()=>{const t=document.querySelector("#newTour").value, date=document.querySelector("#newDate").value.trim(), label=document.querySelector("#newLabel").value.trim()||date, area=document.querySelector("#newArea").value.trim(), venue=document.querySelector("#newVenue").value.trim(), type=document.querySelector("#newType").value; if(!date||!area||!venue){alert("日付・エリア・会場を入れてください");return;} const id=(date.replaceAll("/","-")+"-"+area+"-"+Math.random().toString(36).slice(2,6)).replace(/\s/g,""); data.shows.push({id,date,label,area,venue,status:"未入力",tour:t,series:t==="SHOWCASE"?"SHOWCASE":(t==="FYOD"?"FC":"LIVE-GYM"),type}); selectedTour=t; localStorage.setItem("selectedTour_v4",selectedTour); saveLocal(); alert("公演を追加しました。次にセトリを貼って保存できます。"); render("import");};
}
function renderData(){
 setApp(`<div class="card"><h2>データ管理</h2><p class="muted">ここでローカル保存データを書き出せます。公開ページ全体に反映するには、GitHubのindex.html側にデータを反映する必要があります。</p><div class="controls"><button id="exportBtn">JSONを書き出し</button><button id="resetBtn" class="danger">ローカル保存をリセット</button></div><textarea id="dataOut" rows="14"></textarea></div>`);
 document.querySelector("#exportBtn").onclick=()=>{document.querySelector("#dataOut").value=JSON.stringify(data,null,2)};
 document.querySelector("#resetBtn").onclick=()=>{if(confirm("この端末のローカル保存を消します。よろしいですか？")){localStorage.removeItem("bzData_v4"); location.reload();}};
}
render();
</script>
