<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>B'z Live Setlist DB</title>
<style>
body{background:#0b0f1a;color:#fff;font-family:sans-serif;margin:0}
h1{font-size:22px;padding:10px}
nav button{margin:5px;padding:8px 12px;border-radius:10px;border:none}
.tourbar{margin:10px;padding:10px;border-bottom:1px solid #333}
.tourBtn{margin:5px;padding:6px 10px;border-radius:10px;border:1px solid #555;background:#111;color:#fff}
.tourBtn.active{background:#ffd700;color:#000}
.container{padding:10px}
select,textarea{width:100%;margin:5px 0;padding:8px}
button.action{background:#ffd700;color:#000}
</style>
</head>

<body>

<h1>B'z Live Setlist DB</h1>

<div class="tourbar">
<button class="tourBtn active">FYOP+</button>
<button class="tourBtn">FYOP</button>
<button class="tourBtn">FYOD</button>
<button class="tourBtn">SHOWCASE</button>
</div>

<nav>
<button onclick="showTab('input')">追記</button>
<button onclick="showTab('view')">公演表示</button>
</nav>

<div class="container" id="app"></div>

<script>

let data = JSON.parse(localStorage.getItem("bz")) || {};

function showTab(tab){
  if(tab==="input"){
    document.getElementById("app").innerHTML = `
    <h2>セットリスト入力</h2>
    <input id="show" placeholder="例：仙台1日目">
    <textarea id="songs" rows="10" placeholder="1. 曲名"></textarea>
    <button class="action" onclick="save()">保存</button>
    `;
  }

  if(tab==="view"){
    let html="<h2>公演一覧</h2>";
    for(let key in data){
      html+=`<div><h3>${key}</h3><ol>`;
      data[key].forEach(s=>html+=`<li>${s}</li>`);
      html+="</ol></div>";
    }
    document.getElementById("app").innerHTML=html;
  }
}

function save(){
  const show = document.getElementById("show").value;
  const songs = document.getElementById("songs").value.split("\n")
    .map(s=>s.replace(/^\d+\.\s*/,"").trim())
    .filter(Boolean);

  data[show]=songs;
  localStorage.setItem("bz",JSON.stringify(data));
  alert("保存しました");
}

showTab("view");

</script>

</body>
</html>
